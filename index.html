<script>
    // URL থেকে ডাটা পড়ার ফাংশন
    const params = new URLSearchParams(window.location.search);
    
    // লিঙ্কে যদি 'nameInput' থাকে তবে সেটা দেখাবে, না থাকলে ডিফল্ট নাম দেখাবে
    const dynamicName = params.get('nameInput') || "S DATTATHREYA";
    const dynamicAmount = params.get('amntInput') || "5200";
    const dynamicVpa = params.get('vpaInput') || "444444784@axl";

    // এইচটিএমএল-এ নাম, অ্যামাউন্ট এবং ইউপিআই সেট করা
    document.getElementById('name').innerText = dynamicName;
    document.getElementById('amnt').innerText = dynamicAmount;
    document.getElementById('vpa').innerText = dynamicVpa;

    // বাকি ফাংশনগুলো আগের মতোই থাকবে
    function openGuide() {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('guide-modal').style.display = 'block';
    }

    function submitUTR() {
        const utr = document.getElementById('utr_input').value;
        if(utr.length === 12) {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('success-modal').style.display = 'block';
        } else {
            alert("Please enter a 12-digit UTR number");
        }
    }

    function closeAll() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('guide-modal').style.display = 'none';
        document.getElementById('success-modal').style.display = 'none';
    }

    function copy(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);
        alert("Copied!");
    }

    // টাইমার ৮ মিনিট ২৫ সেকেন্ড
    let totalSec = (8 * 60) + 25;
    setInterval(() => {
        if(totalSec <= 0) return;
        totalSec--;
        document.getElementById('m').innerText = Math.floor(totalSec / 60);
        document.getElementById('s').innerText = (totalSec % 60).toString().padStart(2, '0');
    }, 1000);
</script>
